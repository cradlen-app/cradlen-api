name: CI

on:
  pull_request:
  push:
    branches: [development, testing, main]

# Each run gets its own in-runner Postgres, so runs are isolated; still cancel
# superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      # No --fix in CI: any lint problem must fail the gate, not be auto-patched.
      - run: npx eslint "{src,apps,libs,test}/**/*.ts"
      - run: npm run build

  tests:
    name: Unit + integration + e2e
    runs-on: ubuntu-latest
    needs: quality
    services:
      # Ephemeral, in-runner Postgres — ~0 latency and fully isolated per run
      # (no shared Neon branch). The app talks to it via the node-postgres driver
      # adapter (DB_ADAPTER=pg); Neon stays the prod/dev driver.
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cradlen_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cradlen_test
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/cradlen_test
      DB_ADAPTER: pg
      # Signing secrets for test-minted tokens — fixed, non-production values.
      JWT_ACCESS_SECRET: ci-access-secret-at-least-32-chars-long!!
      JWT_REFRESH_SECRET: ci-refresh-secret-at-least-32-chars-long!!
      JWT_RESET_SECRET: ci-reset-secret-at-least-32-chars-long!!
      APP_URL: http://localhost:3000
      RESEND_API_KEY: test-key
      RESEND_FROM_EMAIL: noreply@example.com
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      # Unit tests with coverage so the coverageThreshold gate is enforced.
      - name: Unit tests (+coverage gate)
        run: npm run test:cov
      # Integration: global-setup runs `migrate deploy` + `db seed` against the
      # in-runner Postgres, then the suites (security / financial / clinical).
      - name: Integration tests
        run: npm run test:integration
      - name: E2E tests
        run: npm run test:e2e
      # Migration integrity: after deploy, the live schema must match schema.prisma
      # with no leftover drift (guards the "column in schema, no migration" class).
      - name: Migration drift check
        run: npm run migrate:check
